<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrCrazy SIM DATABASE - Official</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ═══════════════════════════════════════════
   TOKENS (MrCrazy Branding)
═══════════════════════════════════════════ */
:root {
  --gold-400: #fbbf24;
  --gold-500: #f59e0b;
  --gold-600: #d97706;
  --gold-700: #b45309;
  --surface-0: #0a0a0a;   
  --surface-1: #121212;   
  --surface-2: #1a1a1a;   
  --surface-3: #222222;   
  --text-primary: #f5f0e8;
  --text-secondary: #a1a1aa;
  --border-strong: rgba(251,191,36,0.3);
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans: 'Geist', sans-serif;
  --font-mono: 'Geist Mono', monospace;
  --radius: 12px;
}

body {
  font-family: var(--font-sans);
  background: var(--surface-0);
  color: var(--text-primary);
  margin: 0; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Ambient Background */
.glow-orb {
  position: fixed; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(217,119,6,0.1) 0%, transparent 70%);
  top: -100px; left: 50%; transform: translateX(-50%);
  z-index: 0; pointer-events: none;
}

/* ═══════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════ */
.navbar {
  position: fixed; top: 0; width: 100%; z-index: 100;
  background: rgba(10,10,10,0.8); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  height: 65px; display: flex; align-items: center; justify-content: center;
}

.nav-brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: inherit;
}

.brand-icon {
  width: 35px; height: 35px; background: linear-gradient(135deg, var(--gold-600), var(--gold-400));
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  color: #000; font-size: 1.1rem; box-shadow: 0 0 15px var(--gold-600);
}

.brand-text { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.5px; }
.brand-text span { display: block; font-size: 0.6rem; color: var(--gold-500); text-transform: uppercase; letter-spacing: 1.5px; }

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.container {
  max-width: 550px; margin: 0 auto; padding: 100px 20px 40px;
  position: relative; z-index: 1;
}

.hero-section { text-align: center; margin-bottom: 35px; }
.hero-section h1 { font-family: var(--font-serif); font-size: 2.8rem; font-weight: 400; margin-bottom: 8px; line-height: 1.1; }
.hero-section em { color: var(--gold-400); font-style: italic; }

.card {
  background: var(--surface-1); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 25px; margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.input-box {
  position: relative; margin: 20px 0;
}

.input-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }

input {
  width: 100%; padding: 15px 15px 15px 45px; background: var(--surface-2);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  color: #fff; font-family: var(--font-mono); outline: none; box-sizing: border-box;
}

input:focus { border-color: var(--gold-500); box-shadow: 0 0 10px rgba(245,158,11,0.2); }

.btn-primary {
  width: 100%; padding: 15px; background: linear-gradient(to right, var(--gold-600), var(--gold-700));
  border: none; border-radius: 12px; color: #fff; font-weight: 600; font-size: 1rem;
  cursor: pointer; transition: 0.3s;
}

.btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }

/* ═══════════════════════════════════════════
   RESULTS AREA
═══════════════════════════════════════════ */
.result-section { display: none; animation: fadeIn 0.5s; }

.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.badge { background: rgba(251,191,36,0.1); border: 1px solid var(--gold-600); color: var(--gold-400); padding: 4px 10px; border-radius: 50px; font-size: 0.7rem; font-family: var(--font-mono); }

.data-row { background: var(--surface-2); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--gold-500); }
.label { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; display: block; }
.value { font-weight: 600; font-size: 1rem; color: #fff; }

.action-btns { display: flex; gap: 10px; margin-top: 15px; }
.btn-save { flex: 1; padding: 10px; background: #22c55e; border: none; border-radius: 8px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* ═══════════════════════════════════════════
   FOOTER & CONTACT
═══════════════════════════════════════════ */
.contact-links { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }
.contact-item { text-decoration: none; color: var(--text-secondary); font-size: 0.8rem; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
.contact-item:hover { color: var(--gold-400); }

footer { text-align: center; margin-top: 50px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.7rem; font-family: var(--font-mono); color: var(--text-secondary); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.loading-spinner { display: none; text-align: center; margin: 20px 0; color: var(--gold-500); }
</style>
</head>
<body>

<div class="glow-orb"></div>

<nav class="navbar">
  <a href="https://mrcrazy7778.netlify.app/" class="nav-brand">
    <div class="brand-icon"><i class="fas fa-database"></i></div>
    <div class="brand-text">
      MrCrazy SIM DATABASE
      <span>Team DevStudio Official</span>
    </div>
  </a>
</nav>

<div class="container">
  <header class="hero-section">
    <h1>MrCrazy <em>Lookup</em></h1>
    <p style="color: var(--text-secondary); font-size: 0.9rem;">Fastest Data Retrieval System in Pakistan</p>
  </header>

  <div class="card">
    <div class="input-box">
      <i class="fas fa-search"></i>
      <input type="number" id="searchInput" placeholder="Enter Number (e.g. 0345...)" maxlength="11">
    </div>
    <button class="btn-primary" onclick="searchData()"><i class="fas fa-bolt"></i> GET DATA</button>
  </div>

  <div id="loading" class="loading-spinner">
    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
    <p>Searching Records...</p>
  </div>

  <div id="resultArea" class="result-section">
    <div class="card" id="screenshotCard">
      <div class="result-header">
        <h3 style="margin:0; font-size: 1rem;">Retrieved Information</h3>
        <span class="badge">LIVE DATA</span>
      </div>
      
      <div id="dataOutput">
        </div>

      <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; font-size: 0.6rem; color: var(--gold-500); text-align: center;">
        Verified by MrCrazy DevStudio
      </div>
    </div>

    <div class="action-btns">
      <button class="btn-save" onclick="saveScreenshot()"><i class="fas fa-camera"></i> SAVE TO GALLERY</button>
      <button onclick="resetSearch()" style="background: var(--surface-3); color: #fff; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer;">CLEAR</button>
    </div>
  </div>

  <div class="contact-links">
    <a href="https://wa.me/9779761970136" class="contact-item"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    <a href="https://mrcrazy7778.netlify.app/" class="contact-item"><i class="fas fa-globe"></i> Website</a>
    <a href="https://www.whatsapp.com/c><i class="fas fa-rss"></i> </a>
  </div>

  <footer>
    &copy; 2026 MrCrazy Digital Company. All Rights Reserved.<br>
    DEVELOPED BY MUHAMMAD NAEEM (M.COM)
  </footer>
</div>

<script>
// Search Functionality
async function searchData() {
  const input = document.getElementById('searchInput').value;
  const loading = document.getElementById('loading');
  const resultArea = document.getElementById('resultArea');
  const dataOutput = document.getElementById('dataOutput');

  if (input.length < 10) {
    alert("Please enter a valid Pakistani number.");
    return;
  }

  // UI Setup
  loading.style.display = 'block';
  resultArea.style.display = 'none';

  try {
    // API Call
    const response = await fetch(`https://blacksimdetail.vercel.app/public_apis/simdetailsapi.php?number=${input}`);
    const result = await response.json();

    loading.style.display = 'none';

    if (result.data && result.data.length > 0) {
      const p = result.data[0];
      dataOutput.innerHTML = `
        <div class="data-row">
          <span class="label">Full Name</span>
          <span class="value">${p.Name || 'Not Found'}</span>
        </div>
        <div class="data-row">
          <span class="label">CNIC Number</span>
          <span class="value">${p.CNIC || 'Not Found'}</span>
        </div>
        <div class="data-row">
          <span class="label">Primary Number</span>
          <span class="value">${p.Mobile || input}</span>
        </div>
        <div class="data-row">
          <span class="label">Current Address</span>
          <span class="value" style="font-size: 0.85rem;">${p.Address || 'Not Found'}</span>
        </div>
      `;
      resultArea.style.display = 'block';
    } else {
      alert("No Record Found in Database.");
    }
  } catch (error) {
    loading.style.display = 'none';
    alert("Server Connection Error. Check Internet.");
  }
}

// Screenshot Function
function saveScreenshot() {
  const element = document.getElementById('screenshotCard');
  html2canvas(element, { backgroundColor: '#121212' }).then(canvas => {
    const link = document.createElement('a');
    link.download = `MrCrazy_Data_${Date.now()}.png`;
    link.href = canvas.toDataURL();
    link.click();
  });
}

function resetSearch() {
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('searchInput').value = '';
}
</script>

</body>
</html>
